<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entorno de Pruebas Locales</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-hover: #22263a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --border: #2d3348;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      width: 100%;
      max-width: 800px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }
    
    header p { 
      color: var(--muted); 
      font-size: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: inline-block;
    }

    main {
      width: 100%;
      max-width: 500px;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 15px;
    }

    .app-card:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-5px);
      box-shadow: 0 15px 35px -10px rgba(59, 130, 246, 0.4);
    }

    .app-icon {
      font-size: 40px;
      background: rgba(59, 130, 246, 0.1);
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      margin-bottom: 10px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    .app-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn-enter {
      margin-top: 10px;
      background: var(--accent);
      color: white;
      padding: 10px 25px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .app-card:hover .btn-enter {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header>
    <h1>Portal de <span>Desarrollo</span></h1>
    <p>Hub local para la visualización y testeo de proyectos</p>
  </header>

  <main>
    <a href="prueba/index.html" class="app-card">
      <div class="app-icon">🧪</div>
      <div class="app-title">Proyecto en Pruebas</div>
      <div class="app-desc">
        Acceso directo al directorio de trabajo actual para verificar el diseño y funcionalidad de la aplicación.
      </div>
      <div class="btn-enter">Abrir prototipo</div>
    </a>
  </main>

</body>
</html>
